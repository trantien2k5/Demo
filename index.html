<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Vocab Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./core/css/variables.css">
    <link rel="stylesheet" href="./core/css/base.css">
    <link rel="stylesheet" href="./core/css/layout.css">
    <link rel="stylesheet" href="./core/css/components.css">

</head>

<body>
    <div class="mobile-wrapper">
        <header class="app-header">
            <h1 id="header-title">Smart Vocab Pro</h1>
            <button class="icon-btn"><i class="fa-solid fa-bell"></i></button>
        </header>

        <main id="app-content" class="content-area">
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="home">
                <i class="fa-solid fa-house"></i>
                <span>Trang chủ</span>
            </button>
            <button class="nav-item" data-tab="library">
                <i class="fa-solid fa-book"></i>
                <span>Thư viện</span>
            </button>
            <button class="nav-item" data-tab="game">
                <i class="fa-solid fa-brain"></i> 
                <span>Ôn tập</span> 
            </button>
            <button class="nav-item" data-tab="ranking">
                <i class="fa-solid fa-trophy"></i>
                <span>Xếp hạng</span>
            </button>
            <button class="nav-item" data-tab="profile">
                <i class="fa-solid fa-user"></i>
                <span>Hồ sơ</span>
            </button>
        </nav>
    </div>

    <script type="module" src="./app.js"></script>
</body>

</html>
